<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hi Conner!</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:'Inter','Segoe UI',system-ui,-apple-system,sans-serif;
    background:#0f0f0f;
    color:#e0e0e0;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:2rem 1rem 4rem;
  }
  .table-wrap{
    overflow-x:auto;
    border-radius:12px;
    box-shadow:0 4px 24px rgba(0,0,0,.4);
    margin-bottom:1.5rem;
    max-width:100%;
  }
  table{
    border-collapse:collapse;
    background:#1a1a1a;
    min-width:600px;
    width:100%;
  }
  th,td{
    padding:.825rem 1.05rem;
    text-align:center;
    font-size:1.275rem;
    border:1px solid #2a2a2a;
    white-space:nowrap;
  }
  th{
    background:#1e1e1e;
    font-weight:600;
    color:#a0a0a0;
    text-transform:uppercase;
    font-size:1.125rem;
    letter-spacing:.06em;
    position:sticky;
    top:0;
  }
  th:first-child{
    text-align:right;
    padding-right:1rem;
  }
  td.time-label{
    text-align:right;
    padding-right:1rem;
    font-variant-numeric:tabular-nums;
    color:#888;
    font-size:1.2rem;
    cursor:default;
    background:#1a1a1a;
  }
  td.slot{
    cursor:pointer;
    background:#1e1e1e;
    transition:background .15s,box-shadow .15s;
    user-select:none;
    -webkit-user-select:none;
    position:relative;
    min-width:120px;
  }
  td.slot:hover{
    background:#2a2a2a;
    box-shadow:inset 0 0 0 2px #3b82f6;
  }
  td.slot.selected{
    background:linear-gradient(135deg,#2563eb,#1d4ed8);
    color:#fff;
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.12);
  }
  td.slot.selected:hover{
    background:linear-gradient(135deg,#3b82f6,#2563eb);
    box-shadow:inset 0 0 0 2px #60a5fa;
  }
  td.slot.selected::after{
    content:'✓';
    font-size:1.125rem;
    opacity:.7;
  }
  .option-btns{
    display:flex;
    flex-wrap:wrap;
    gap:.9rem;
    margin-bottom:2.7rem;
    justify-content:center;
    max-width:1050px;
  }
  .option-btn{
    padding:.9rem 1.65rem;
    border-radius:12px;
    border:1px solid #333;
    background:#1a1a1a;
    color:#aaa;
    font-size:1.23rem;
    cursor:pointer;
    transition:all .2s;
  }
  .option-btn:hover{
    border-color:#555;
    color:#ccc;
  }
  .option-btn.active{
    border-color:#3b82f6;
    background:#1e293b;
    color:#93c5fd;
  }
  .generate-btn{
    padding:1.35rem 4.2rem;
    font-size:1.725rem;
    font-weight:600;
    border:none;
    border-radius:10px;
    background:linear-gradient(135deg,#3b82f6,#2563eb);
    color:#fff;
    cursor:pointer;
    transition:transform .15s,box-shadow .15s;
    box-shadow:0 4px 16px rgba(59,130,246,.3);
    margin-bottom:1.5rem;
    letter-spacing:-.01em;
  }
  .generate-btn:hover{
    transform:translateY(-1px);
    box-shadow:0 6px 24px rgba(59,130,246,.45);
  }
  .generate-btn:active{
    transform:translateY(0);
  }
  #output{
    max-width:600px;
    width:100%;
    display:none;
  }
  .message-box{
    background:#1a1a1a;
    border:1px solid #2a2a2a;
    border-radius:10px;
    padding:1.4rem 1.6rem;
    white-space:pre-wrap;
    font-size:.92rem;
    line-height:1.7;
    color:#d0d0d0;
    margin-bottom:.8rem;
  }
  .copy-btn{
    padding:.825rem 2.1rem;
    font-size:1.275rem;
    font-weight:500;
    border:1px solid #333;
    border-radius:8px;
    background:#1a1a1a;
    color:#93c5fd;
    cursor:pointer;
    transition:all .2s;
  }
  .copy-btn:hover{
    border-color:#3b82f6;
    background:#1e293b;
  }
  .warning{
    color:#f87171;
    font-size:.9rem;
    margin-bottom:1rem;
  }
  @media(max-width:640px){
    h1{font-size:2rem}
    body{padding:1rem .25rem 3rem}
    table{min-width:0;width:100%}
    td.slot{min-width:0}
    th,td{padding:.35rem .2rem;font-size:.65rem}
    td.time-label{font-size:.6rem;padding-right:.3rem}
    td.slot.selected::after{font-size:.7rem}
    .option-btns{gap:.5rem}
    .option-btn{padding:.6rem .8rem;font-size:.8rem}
    .generate-btn{padding:.9rem 2.5rem;font-size:1.2rem}
    .copy-btn{padding:.6rem 1.2rem;font-size:.9rem}
  }
</style>
</head>
<body>

<div class="table-wrap">
  <table id="schedule"></table>
</div>

<div class="option-btns">
  <button class="option-btn" data-idx="0">Sorry that our schedule is a bit tight next week!</button>
  <button class="option-btn" data-idx="1">Hope we can do two sessions!</button>
</div>

<button class="generate-btn" onclick="generate()">Hi Conner!</button>

<div id="output">
  <div class="message-box" id="msg"></div>
  <button class="copy-btn" id="copyBtn" onclick="copyMsg()">Copy to Clipboard</button>
</div>

<script>
const DAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday'];
const DAYS_SHORT = ['Mon','Tue','Wed','Thu','Fri'];
const START = 9, END = 16.5, STEP = 0.5;
const slots = [];

function fmt(h){
  const hh = Math.floor(h);
  const mm = h % 1 === 0 ? '00' : '30';
  return `${hh}:${mm}`;
}

// Drag-select state
let dragging = false;
let dragMode = null; // 'select' or 'deselect'
let dragCol = null;  // lock to the column where drag started

// Build table
const tbl = document.getElementById('schedule');
(function(){
  const hdr = document.createElement('tr');
  hdr.innerHTML = '<th></th>' + DAYS_SHORT.map(d => `<th>${d}</th>`).join('');
  tbl.appendChild(hdr);

  for(let h = START; h < END; h += STEP){
    const row = document.createElement('tr');
    row.innerHTML = `<td class="time-label">${fmt(h)}\u2009–\u2009${fmt(h+STEP)}</td>`;
    DAYS.forEach((d, di) => {
      const td = document.createElement('td');
      td.className = 'slot';
      td.dataset.day = String(di);
      td.dataset.start = String(h);

      td.addEventListener('mousedown', function(e){
        e.preventDefault();
        dragging = true;
        dragCol = this.dataset.day;
        dragMode = this.classList.contains('selected') ? 'deselect' : 'select';
        if(dragMode === 'select') this.classList.add('selected');
        else this.classList.remove('selected');
      });

      td.addEventListener('mouseenter', function(){
        if(!dragging) return;
        if(this.dataset.day !== dragCol) return;
        if(dragMode === 'select') this.classList.add('selected');
        else this.classList.remove('selected');
      });

      row.appendChild(td);
    });
    tbl.appendChild(row);
  }
})();

window.addEventListener('mouseup', function(){ dragging = false; });

// Touch drag-select
tbl.addEventListener('touchstart', function(e){
  const td = e.target.closest('td.slot');
  if(!td) return;
  e.preventDefault();
  dragging = true;
  dragCol = td.dataset.day;
  dragMode = td.classList.contains('selected') ? 'deselect' : 'select';
  if(dragMode === 'select') td.classList.add('selected');
  else td.classList.remove('selected');
}, {passive: false});

tbl.addEventListener('touchmove', function(e){
  if(!dragging) return;
  e.preventDefault();
  const t = e.touches[0];
  const el = document.elementFromPoint(t.clientX, t.clientY);
  const td = el && el.closest ? el.closest('td.slot') : null;
  if(!td || td.dataset.day !== dragCol) return;
  if(dragMode === 'select') td.classList.add('selected');
  else td.classList.remove('selected');
}, {passive: false});

window.addEventListener('touchend', function(){ dragging = false; });

// Option buttons toggle
document.querySelectorAll('.option-btn').forEach(b => {
  b.addEventListener('click', () => b.classList.toggle('active'));
});

function generate(){
  const sel = {};
  document.querySelectorAll('td.slot.selected').forEach(td => {
    const di = +td.dataset.day;
    const s = +td.dataset.start;
    if(!sel[di]) sel[di] = [];
    sel[di].push(s);
  });

  const out = document.getElementById('output');
  const msg = document.getElementById('msg');

  if(Object.keys(sel).length === 0){
    out.style.display = 'block';
    msg.innerHTML = '<span class="warning">Please select at least one time slot.</span>';
    document.getElementById('copyBtn').style.display = 'none';
    return;
  }
  document.getElementById('copyBtn').style.display = '';

  let lines = ['Hi Conner, our availability next week is as follows:',''];

  for(let di = 0; di < DAYS.length; di++){
    if(!sel[di]) continue;
    const times = sel[di].sort((a,b) => a - b);
    // merge consecutive
    const ranges = [];
    let rs = times[0], re = times[0] + STEP;
    for(let i = 1; i < times.length; i++){
      if(times[i] === re) re = times[i] + STEP;
      else { ranges.push([rs, re]); rs = times[i]; re = times[i] + STEP; }
    }
    ranges.push([rs, re]);

    const parts = ranges.map(r => `${fmt(r[0])}-${fmt(r[1])}`);
    let joined;
    if(parts.length === 1) joined = parts[0];
    else if(parts.length === 2) joined = parts[0] + ' and ' + parts[1];
    else joined = parts.slice(0,-1).join(', ') + ', and ' + parts[parts.length-1];

    lines.push(`${DAYS[di]}: ${joined}`);
  }

  lines.push('');

  // optional sentences
  const optBtns = document.querySelectorAll('.option-btn');
  const btn0 = optBtns[0].classList.contains('active');
  const btn1 = optBtns[1].classList.contains('active');
  if(btn0 && btn1){
    lines.push('Sorry that our schedule is a bit tight next week. Hope we can do two sessions!');
    lines.push('');
  } else if(btn0){
    lines.push(optBtns[0].textContent);
    lines.push('');
  } else if(btn1){
    lines.push(optBtns[1].textContent);
    lines.push('');
  }

  lines.push('Best,');
  lines.push('Shota');

  out.style.display = 'block';
  msg.textContent = lines.join('\n');
}

function copyMsg(){
  const text = document.getElementById('msg').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy to Clipboard', 2000);
  });
}
</script>
</body>
</html>
